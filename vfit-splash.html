<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; overflow:hidden;
    background:radial-gradient(circle at 50% 42%, #0c1a3a 0%, #08122b 55%, #060d20 100%);
    font-family:'Space Grotesk', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    display:flex; align-items:center; justify-content:center;
  }
  .bg{position:fixed; inset:0; pointer-events:none}
  .grid{z-index:0;
    background-image:linear-gradient(rgba(58,181,74,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(58,181,74,.06) 1px,transparent 1px);
    background-size:40px 40px;
    -webkit-mask:radial-gradient(circle at 50% 46%, #000 22%, transparent 72%);
            mask:radial-gradient(circle at 50% 46%, #000 22%, transparent 72%);
    animation:gridDrift 55s linear infinite}
  .dots{z-index:1}
  .dots i{position:absolute; border-radius:50%; opacity:0; will-change:transform,opacity}
  .vig{z-index:2; background:radial-gradient(circle at 50% 44%, transparent 42%, rgba(4,9,22,.6) 100%)}
  .wrap{position:relative; z-index:3; display:flex; flex-direction:column; align-items:center}
  .stage{position:relative; width:210px; height:210px; display:grid; place-items:center}
  .glow{position:absolute; top:50%; left:50%; width:300px; height:300px; margin:-150px 0 0 -150px; border-radius:50%;
    background:radial-gradient(circle, rgba(58,181,74,.5), rgba(58,181,74,.12) 45%, transparent 68%);
    filter:blur(7px); z-index:0; animation:cGlow 6s ease-in-out infinite; will-change:transform,opacity}
  .ring{position:absolute; top:50%; left:50%; width:160px; height:160px; margin:-80px 0 0 -80px; border-radius:50%;
    z-index:0; transform:scale(.7); opacity:0; will-change:transform,opacity}
  .ringA{border:2px solid rgba(74,200,110,.6); animation:v3RingA 6s linear infinite}
  .ringB{border:2px solid rgba(74,200,110,.45); animation:v3RingB 6s linear infinite}
  .icon{position:relative; z-index:2; width:160px; height:160px; border-radius:34px; overflow:hidden;
    animation:v3Icon 6s cubic-bezier(.2,.75,.3,1) infinite; will-change:transform,opacity; backface-visibility:hidden}
  .icon svg{display:block; width:100%; height:100%}
  .arc{transform-box:view-box; transform-origin:512px 600px; opacity:0; will-change:transform,opacity}
  .arcA{animation:cArcA 6s cubic-bezier(.2,.8,.2,1) infinite}
  .arcB{animation:cArcB 6s cubic-bezier(.2,.8,.2,1) infinite}
  .arcC{animation:cArcC 6s cubic-bezier(.2,.8,.2,1) infinite}
  .name{margin:38px 0 0; font-size:33px; font-weight:bold; letter-spacing:.16em; text-transform:uppercase;
    color:#edf4ee; text-shadow:0 2px 22px rgba(58,181,74,.22); padding-left:.16em;
    animation:cWord 6s cubic-bezier(.2,.8,.2,1) infinite; will-change:transform,opacity}
  .line{width:54px; height:3px; margin-top:15px; border-radius:3px;
    background:linear-gradient(90deg,#2e9f3c,#4ed06a); box-shadow:0 0 10px rgba(58,181,74,.6);
    transform-origin:center; transform:scaleX(0); animation:cLine 6s cubic-bezier(.2,.8,.2,1) infinite; will-change:transform,opacity}
  @media (prefers-reduced-motion: reduce){
    .icon,.arc,.name,.line,.glow,.ring,.dots i,.grid{animation:none !important; opacity:1 !important; transform:none !important}
    .arc{transform:scale(1) !important}
  }
  @keyframes cArcA{0%{transform:scale(.12);opacity:0}13%{transform:scale(.12);opacity:0}18%{transform:scale(1.22);opacity:1}21.5%{transform:scale(1)}54%{transform:scale(1)}58%{transform:scale(1.13)}62%{transform:scale(1)}100%{transform:scale(1);opacity:1}}
  @keyframes cArcB{0%{transform:scale(.12);opacity:0}16%{transform:scale(.12);opacity:0}21%{transform:scale(1.22);opacity:1}24.5%{transform:scale(1)}55%{transform:scale(1)}59%{transform:scale(1.11)}63%{transform:scale(1)}100%{transform:scale(1);opacity:1}}
  @keyframes cArcC{0%{transform:scale(.12);opacity:0}19%{transform:scale(.12);opacity:0}24%{transform:scale(1.22);opacity:1}27.5%{transform:scale(1)}56%{transform:scale(1)}60%{transform:scale(1.09)}64%{transform:scale(1)}100%{transform:scale(1);opacity:1}}
  @keyframes cWord{0%{opacity:0;transform:translateY(16px)}18%{opacity:0;transform:translateY(16px)}28%{opacity:1;transform:translateY(0)}73%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-9px)}}
  @keyframes cLine{0%{transform:scaleX(0);opacity:0}22%{transform:scaleX(0);opacity:0}31%{transform:scaleX(1);opacity:1}73%{transform:scaleX(1);opacity:1}100%{transform:scaleX(0);opacity:0}}
  @keyframes cGlow{0%{opacity:0;transform:scale(.55)}12%{opacity:.5;transform:scale(1)}54%{opacity:.32;transform:scale(1.02)}58%{opacity:.6;transform:scale(1.07)}64%{opacity:.32;transform:scale(1.02)}73%{opacity:.32;transform:scale(1.02)}100%{opacity:0;transform:scale(1.14)}}
  @keyframes v3Icon{0%{opacity:0;transform:scale(.6)}5%{opacity:1;transform:scale(1.08)}9%{transform:scale(1)}50%{transform:scale(1)}57%{transform:scale(1.03)}64%{transform:scale(1)}75%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.92)}}
  @keyframes v3RingA{0%{transform:scale(.7);opacity:0}3%{opacity:.55}24%{transform:scale(3);opacity:0}24.01%{transform:scale(.7);opacity:0}30%{opacity:.5}51%{transform:scale(3);opacity:0}51.01%{transform:scale(.7);opacity:0}57%{opacity:.45}78%{transform:scale(3);opacity:0}100%{transform:scale(3);opacity:0}}
  @keyframes v3RingB{0%{transform:scale(.7);opacity:0}15%{transform:scale(.7);opacity:0}18%{opacity:.5}39%{transform:scale(3);opacity:0}39.01%{transform:scale(.7);opacity:0}45%{opacity:.45}66%{transform:scale(3);opacity:0}66.01%{transform:scale(.7);opacity:0}72%{opacity:.4}93%{transform:scale(3);opacity:0}100%{transform:scale(3);opacity:0}}
  @keyframes pDriftA{0%{transform:translate(0,0)}50%{transform:translate(7px,-11px)}100%{transform:translate(0,0)}}
  @keyframes pDriftB{0%{transform:translate(0,0)}50%{transform:translate(-9px,-6px)}100%{transform:translate(0,0)}}
  @keyframes pDriftC{0%{transform:translate(0,0)}50%{transform:translate(6px,10px)}100%{transform:translate(0,0)}}
  @keyframes tw{0%{opacity:.26}100%{opacity:1}}
  @keyframes gridDrift{0%{background-position:0 0}100%{background-position:40px 40px}}
</style>
