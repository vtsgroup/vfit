<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#18181B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  
  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" />
  
  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#6366F1" opacity="0.05" />
  <circle cx="150" cy="500" r="150" fill="#8B5CF6" opacity="0.05" />
  
  <!-- Logo icon (dumbbell) -->
  <g transform="translate(80, 200)">
    <rect x="0" y="20" width="60" height="10" rx="5" fill="#6366F1" />
    <rect x="5" y="8" width="12" height="34" rx="3" fill="#6366F1" />
    <rect x="43" y="8" width="12" height="34" rx="3" fill="#6366F1" />
    <rect x="-2" y="12" width="8" height="26" rx="3" fill="#8B5CF6" />
    <rect x="54" y="12" width="8" height="26" rx="3" fill="#8B5CF6" />
  </g>
  
  <!-- Title -->
  <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white">
    Personal IA
  </text>
  
  <!-- Subtitle -->
  <text x="80" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#A1A1AA">
    Plataforma para Personal Trainers
  </text>
  
  <!-- Features pills -->
  <g transform="translate(80, 420)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="#6366F1" opacity="0.15" />
    <text x="90" y="26" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="#A5B4FC" text-anchor="middle">Treinos com IA</text>
    
    <rect x="200" y="0" width="200" height="40" rx="20" fill="#6366F1" opacity="0.15" />
    <text x="300" y="26" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="#A5B4FC" text-anchor="middle">Gestão de Alunos</text>
    
    <rect x="420" y="0" width="220" height="40" rx="20" fill="#6366F1" opacity="0.15" />
    <text x="530" y="26" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="#A5B4FC" text-anchor="middle">Cobranças PIX/Cartão</text>
  </g>
  
  <!-- URL -->
  <text x="80" y="540" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="#6366F1">
    vfit.app.br
  </text>
  
  <!-- Free badge -->
  <g transform="translate(80, 560)">
    <rect x="0" y="0" width="240" height="32" rx="16" fill="#22C55E" opacity="0.15" />
    <text x="120" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4ADE80" text-anchor="middle">✨ Comece grátis — até 5 alunos</text>
  </g>
</svg>
