<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- EVOLUIA App Icon: Dumbbell on dark background -->
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#050A12"/>
  
  <!-- Dumbbell Icon (centered, athletic style) -->
  <g transform="translate(96, 176)">
    <!-- Left weight plates -->
    <rect x="0" y="24" width="32" height="112" rx="10" fill="#22C55E"/>
    <rect x="40" y="40" width="24" height="80" rx="8" fill="#22C55E" opacity="0.85"/>
    
    <!-- Bar -->
    <rect x="64" y="68" width="192" height="24" rx="8" fill="#22C55E" opacity="0.6"/>
    
    <!-- Right weight plates -->
    <rect x="256" y="40" width="24" height="80" rx="8" fill="#22C55E" opacity="0.85"/>
    <rect x="288" y="24" width="32" height="112" rx="10" fill="#22C55E"/>
  </g>
  
  <!-- Subtle glow effect -->
  <circle cx="256" cy="256" r="120" fill="#22C55E" opacity="0.06"/>
</svg>
