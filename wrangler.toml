name = "vfit-api"
main = "workers/index.ts"
compatibility_date = "2026-02-06"
compatibility_flags = ["nodejs_compat"]
tsconfig = "tsconfig.workers.json"
workers_dev = true

# ============================================
# Routes (custom domain) — Ativado em 20/02/2026
# ============================================
routes = [
  { pattern = "api.vfit.app.br/*", zone_name = "vfit.app.br" },
  { pattern = "images.vfit.app.br/*", zone_name = "vfit.app.br" }
]

# ============================================
# Analytics Engine
# ============================================
analytics_engine_datasets = [
  { binding = "ANALYTICS" }
]

# ============================================
# Cloudflare Workers AI + AI Gateway
# Modelos: Llama 3.3 70B, Llama 4 Scout, Llama 3.1 8B
# Gateway: logs, caching, rate-limiting, analytics
# Custo: $0 (free tier) para primeiros 10k neurons/dia
# ============================================
[ai]
binding = "AI"

# ============================================
# Runtime vars (media public URLs)
# ============================================
[vars]
R2_IMAGES_URL = "https://images.iapersonal.app.br"
R2_VIDEOS_URL = "https://videos.iapersonal.app.br"

# ============================================
# D1 Database (Cold Data - Exercise Library)
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "vfit-exercises"
database_id = "cca37216-849a-47ce-a183-a62990a0ff1b"
migrations_dir = "migrations/d1"

# ============================================
# Hyperdrive (Hot Data - PostgreSQL via Neon)
# Connection pooling otimizado pelo Cloudflare edge
# Config: vfit-db → Neon PostgreSQL sa-east-1
# ============================================
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "4aa45e1bd72742ec8eab876215cee1a2"

# ============================================
# KV Namespaces
# ============================================
[[kv_namespaces]]
binding = "KV_CACHE"
id = "e7147f8855184a4a8f72307756596df4"

[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "91d34b6725564de39e8ed891e742e76d"

[[kv_namespaces]]
binding = "KV_RATE_LIMIT"
id = "d94c62b1e8f248a6bd1ea6a11e18f09c"

[[kv_namespaces]]
binding = "KV_IMAGES"
id = "18053a73020242bcba036299d09426b9"

# ============================================
# R2 Buckets
# ============================================
[[r2_buckets]]
binding = "R2_VIDEOS"
bucket_name = "vfit-videos"

[[r2_buckets]]
binding = "R2_IMAGES"
bucket_name = "vfit-images"

# ============================================
# Cloudflare Stream (Sprint E — exercise videos)
# Ativar quando configurar Stream no Dashboard
# ============================================
# [vars]
# CF_STREAM_SUBDOMAIN = "customer-xxx"  # Obter do Dashboard > Stream
# Secrets (via wrangler secret put):
# CF_STREAM_API_TOKEN
# CF_STREAM_SIGNING_KEY_ID
# CF_STREAM_SIGNING_KEY_JWK

# ============================================
# Cloudflare Image Resizing
# Habilitado via Dashboard > Speed > Optimization > Image Resizing
# Funciona automaticamente nos custom domains R2
# URL: images.vfit.app.br/cdn-cgi/image/{params}/{path}
# ============================================

