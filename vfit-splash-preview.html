<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#08122B">
<title>VFIT · preview do splash (resultado final)</title>
<!-- Preview-only: Space Grotesk via Google Fonts. No app, é auto-hospedada pelo next/font (var --font-space-grotesk). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  /* ===== ESPELHO do componente React: src/components/ui/splash-screen.tsx (v5) ===== */
  .vsp-root{
    position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; overflow:hidden;
    /* borda #050a12 = manifest background_color → handoff TWA/PWA sem emenda */
    background:radial-gradient(circle at 50% 42%, #0c1a3a 0%, #08122b 55%, #050a12 100%);
    color-scheme:dark; opacity:1; transform:scale(1);
    transition:opacity .6s cubic-bezier(.2,.8,.2,1), transform .6s cubic-bezier(.2,.8,.2,1);
  }
  .vsp-root.vsp-exit{opacity:0; transform:scale(1.04); pointer-events:none}
  .vsp-bg{position:absolute; inset:0; pointer-events:none}
  .vsp-grid{
    z-index:0; inset:-40px;
    background-image:linear-gradient(rgba(58,181,74,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(58,181,74,.06) 1px,transparent 1px);
    background-size:40px 40px;
    -webkit-mask:radial-gradient(circle at 50% 46%, #000 22%, transparent 72%); mask:radial-gradient(circle at 50% 46%, #000 22%, transparent 72%);
    will-change:transform; animation:vsp-gridDrift 55s linear infinite;
  }
  .vsp-dots{z-index:1}
  .vsp-dots i{position:absolute; border-radius:50%; will-change:transform,opacity}
  .vsp-vig{z-index:2; background:radial-gradient(circle at 50% 44%, transparent 42%, rgba(4,9,22,.6) 100%)}
  .vsp-wrap{position:relative; z-index:3; display:flex; flex-direction:column; align-items:center}
  .vsp-stage{position:relative; width:210px; height:210px; display:grid; place-items:center}
  .vsp-glow{
    position:absolute; top:50%; left:50%; width:300px; height:300px; margin:-150px 0 0 -150px; border-radius:50%;
    background:radial-gradient(circle, rgba(58,181,74,.5), rgba(58,181,74,.12) 45%, transparent 68%);
    filter:blur(5px); z-index:0; opacity:0; will-change:opacity;
    animation:vsp-glowIn .6s ease-out forwards, vsp-glowPulse 5s ease-in-out 1s infinite;
  }
  .vsp-ring{position:absolute; top:50%; left:50%; width:160px; height:160px; margin:-80px 0 0 -80px; border-radius:50%; z-index:0; transform:scale(.7); opacity:0; will-change:transform,opacity}
  .vsp-ringA{border:2px solid rgba(74,200,110,.55); animation:vsp-ring 3.4s linear .2s infinite}
  .vsp-ringB{border:2px solid rgba(74,200,110,.4);  animation:vsp-ring 3.4s linear 1.9s infinite}
  .vsp-icon{
    position:relative; z-index:2; width:152px; height:152px; border-radius:34px; overflow:hidden; opacity:0; transform:scale(.6);
    backface-visibility:hidden; will-change:transform,opacity; box-shadow:0 22px 60px -18px rgba(58,181,74,.5);
    animation:vsp-iconIn .85s cubic-bezier(.2,.75,.3,1) forwards;
  }
  .vsp-mark-svg{display:block; width:100%; height:100%}
  .vsp-arc{transform-box:view-box; transform-origin:512px 600px; opacity:0; transform:scale(.2); will-change:transform,opacity}
  .vsp-arcC{animation:vsp-arcIn .7s cubic-bezier(.2,.8,.2,1) .34s forwards}
  .vsp-arcB{animation:vsp-arcIn .7s cubic-bezier(.2,.8,.2,1) .46s forwards}
  .vsp-arcA{animation:vsp-arcIn .7s cubic-bezier(.2,.8,.2,1) .58s forwards}
  .vsp-name{
    margin:36px 0 0; font-family:'Space Grotesk', system-ui, sans-serif; font-size:clamp(34px,9vw,48px); font-weight:900; letter-spacing:.16em;
    text-transform:uppercase; color:#edf4ee; padding-left:.16em; line-height:1;
    -webkit-text-stroke:.6px #edf4ee; text-shadow:0 2px 26px rgba(58,181,74,.28);
    opacity:0; transform:translateY(14px); will-change:transform,opacity; animation:vsp-wordIn .5s cubic-bezier(.2,.8,.2,1) .5s forwards;
  }
  .vsp-track{position:relative; width:150px; height:4px; margin-top:18px; border-radius:4px; overflow:hidden; background:rgba(255,255,255,.08)}
  .vsp-bar{position:absolute; inset:0; border-radius:4px; transform-origin:left center; background:linear-gradient(90deg,#2e9f3c,#4ed06a); box-shadow:0 0 10px rgba(58,181,74,.6)}
  .vsp-bar-loading{transform:scaleX(.06); animation:vsp-barCreep 6s cubic-bezier(.15,.7,.2,1) .55s forwards}
  .vsp-bar-done{transform:scaleX(1); transition:transform .35s cubic-bezier(.2,.8,.2,1)}
  .vsp-bar-shimmer{position:absolute; inset:0; width:40%; border-radius:4px; background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent); transform:translateX(-120%); will-change:transform; animation:vsp-barShimmer 1.5s ease-in-out .6s infinite}
  @keyframes vsp-iconIn{0%{opacity:0;transform:scale(.6)}62%{opacity:1;transform:scale(1.07)}100%{opacity:1;transform:scale(1)}}
  @keyframes vsp-arcIn{0%{opacity:0;transform:scale(.18)}72%{opacity:1;transform:scale(1.16)}100%{opacity:1;transform:scale(1)}}
  @keyframes vsp-ring{0%{transform:scale(.7);opacity:0}10%{opacity:.5}100%{transform:scale(2.7);opacity:0}}
  @keyframes vsp-glowIn{0%{opacity:0;transform:scale(.6)}100%{opacity:.6;transform:scale(1)}}
  @keyframes vsp-glowPulse{0%,100%{opacity:.42}50%{opacity:.66}}
  @keyframes vsp-wordIn{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes vsp-barCreep{0%{transform:scaleX(.06)}100%{transform:scaleX(.9)}}
  @keyframes vsp-barShimmer{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}
  @keyframes vsp-tw{0%{opacity:var(--twMin,.3)}100%{opacity:1}}
  @keyframes vsp-drift{0%{transform:translate(0,0)}50%{transform:translate(var(--dx,0),var(--dy,0))}100%{transform:translate(0,0)}}
  @keyframes vsp-gridDrift{0%{transform:translate(0,0)}100%{transform:translate(40px,40px)}}
  @media (prefers-reduced-motion: reduce){
    .vsp-grid,.vsp-dots i,.vsp-glow,.vsp-ring,.vsp-bar-shimmer{animation:none !important}
    .vsp-icon,.vsp-name,.vsp-glow{animation:none !important; opacity:1 !important; transform:none !important}
    .vsp-arc{animation:none !important; opacity:1 !important; transform:scale(1) !important}
    .vsp-glow{opacity:.5 !important}
    .vsp-bar-loading{animation:none !important; transform:scaleX(.5) !important}
  }
  /* ===== Controles do preview (não fazem parte do componente) ===== */
  .pv-ctl{position:fixed; z-index:10001; bottom:18px; left:50%; transform:translateX(-50%); display:flex; gap:10px; font-family:system-ui,sans-serif}
  .pv-ctl button{appearance:none; border:1px solid rgba(74,200,110,.4); background:rgba(34,197,94,.14); color:#bbf7d0; font-weight:700; font-size:12px; padding:9px 16px; border-radius:999px; cursor:pointer; backdrop-filter:blur(8px)}
  .pv-ctl button:hover{background:rgba(34,197,94,.24)}
  .pv-note{position:fixed; z-index:10001; top:16px; left:50%; transform:translateX(-50%); font-family:system-ui,sans-serif; font-size:11px; color:rgba(189,247,208,.55); letter-spacing:.04em}
</style>
</head>

      </div>
      <h1 class="vsp-name">VFIT</h1>
      <div class="vsp-track">
        <div class="vsp-bar vsp-bar-loading" id="bar"></div>
        <div class="vsp-bar-shimmer"></div>
      </div>
    </div>
  </div>

  <div class="pv-ctl">
    <button onclick="complete()">✓ simular “app carregado”</button>
    <button onclick="location.reload()">↻ repetir</button>
  </div>

  <script>
    // campo de partículas (preview: Math.random ok; no app é mulberry32 determinístico/SSR-safe)
    var dots = document.getElementById('dots');
    for (var i = 0; i < 24; i++) {
      var green = Math.random() > 0.42, size = (1 + Math.random()*2.4);
      var el = document.createElement('i');
      el.style.cssText =
        'left:'+(Math.random()*100).toFixed(1)+'%;top:'+(Math.random()*100).toFixed(1)+'%;'+
        'width:'+size.toFixed(1)+'px;height:'+size.toFixed(1)+'px;'+
        'background:'+(green?'rgba(104,206,128,'+(0.16+Math.random()*0.26).toFixed(2)+')':'rgba(222,236,226,'+(0.14+Math.random()*0.3).toFixed(2)+')')+';'+
        (green&&size>2.4?'box-shadow:0 0 6px rgba(74,200,110,.55);':'')+
        '--dx:'+(Math.random()*16-8).toFixed(1)+'px;--dy:'+(Math.random()*16-8).toFixed(1)+'px;--twMin:'+(0.22+Math.random()*0.28).toFixed(2)+';'+
        'animation:vsp-drift '+(11+Math.random()*12).toFixed(1)+'s ease-in-out -'+(Math.random()*22).toFixed(1)+'s infinite, vsp-tw '+(3+Math.random()*4).toFixed(1)+'s ease-in-out -'+(Math.random()*6).toFixed(1)+'s infinite alternate';
      dots.appendChild(el);
    }
    // simula "app ficou pronto": barra completa → splash sai (igual ao componente)
    function complete(){
      var bar = document.getElementById('bar');
      bar.classList.remove('vsp-bar-loading'); bar.classList.add('vsp-bar-done');
      setTimeout(function(){ document.getElementById('root').classList.add('vsp-exit'); }, 380);
    }
    // auto-demonstra o ciclo uma vez após a entrada
    setTimeout(complete, 3200);
  </script>
</body>
